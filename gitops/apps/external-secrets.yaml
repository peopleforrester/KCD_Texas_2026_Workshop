# ABOUTME: ArgoCD Application for External Secrets Operator.
# ABOUTME: Syncs secrets from AWS Secrets Manager to Kubernetes via IRSA.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: "1.3.2"
    helm:
      valuesObject:
        serviceAccount:
          create: true
          name: external-secrets
          annotations:
            # ESO needs an IRSA role to reach AWS Secrets Manager. The kubeauto
            # reference build creates this role via Terraform; in the KCD workshop
            # context the role is NOT pre-provisioned, so ESO will deploy but
            # its ClusterSecretStore (defined in eso-resources) will fail to
            # authenticate to Secrets Manager. That's expected honest scorecard
            # data — Install passes, Integration scores low. To actually wire
            # this up, replace this with an IRSA role ARN in your AWS account.
            eks.amazonaws.com/role-arn: "arn:aws:iam::PLACEHOLDER:role/eso-controller"
        # CRD install handled by chart
        installCRDs: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
