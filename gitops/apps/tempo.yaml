# ABOUTME: ArgoCD Application for Grafana Tempo distributed tracing backend.
# ABOUTME: Receives traces from OTel Collector, queryable via Grafana.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: tempo
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: "1.18.1"
    helm:
      valuesObject:
        tempo:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal
          retention:
            24h
        # Workshop runs ephemerally — Accenture cluster has no CSI driver
        # provisioner for gp2, so PVCs would Pend. emptyDir works fine
        # for the workshop's 90-minute lifespan.
        persistence:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
