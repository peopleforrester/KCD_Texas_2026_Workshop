# ABOUTME: ArgoCD Application for the load generator.
# ABOUTME: Simulates traffic against all demo apps for observability data.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: load-generator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/KCD_Texas_2026_Workshop.git
    targetRevision: main
    path: gitops/manifests/load-generator
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
