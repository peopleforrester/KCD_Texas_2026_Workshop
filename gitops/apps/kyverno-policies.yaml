# ABOUTME: ArgoCD Application that applies the workshop's three Kyverno ClusterPolicies.
# ABOUTME: Sync wave -4 (after kyverno wave -5); enforces label, resource-limit, and privileged-container rules in the apps namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/peopleforrester/KCD_Texas_2026_Workshop.git
    targetRevision: main
    path: gitops/manifests/kyverno-policies
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # Kyverno's admission webhook fills in defaulted spec fields that aren't in the
  # git manifest. Without this, ArgoCD flags every ClusterPolicy OutOfSync forever
  # even though the actual policy behavior is correct. Discovered during live
  # validation on 2026-05-14.
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      jsonPointers:
        - /spec/admission
        - /spec/emitWarning
      jqPathExpressions:
        - .spec.rules[].skipBackgroundRequests
        - .spec.rules[].validate.allowExistingViolations
