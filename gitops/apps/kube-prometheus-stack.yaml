# ABOUTME: ArgoCD Application that installs kube-prometheus-stack (Prometheus + Grafana).
# ABOUTME: Sync wave 1; provides cluster metrics and dashboards for the workshop IDP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: "84.5.0"
    helm:
      valuesObject:
        grafana:
          # Cleartext admin password is acceptable here -- workshop clusters
          # are ephemeral and destroyed shortly after the session.  For any
          # longer-lived environment, rotate this or set
          # admin.existingSecret to an ExternalSecret-managed Secret.
          adminPassword: "kcd-texas"
        prometheus:
          prometheusSpec:
            retention: 2h
        alertmanager:
          # Disabled for the workshop -- keeps the install lean and avoids
          # paging on transient install-time alerts.
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
