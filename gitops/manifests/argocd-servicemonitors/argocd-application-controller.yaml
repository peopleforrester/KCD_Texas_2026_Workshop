# ABOUTME: ServiceMonitor for the argocd-application-controller's metrics endpoint.
# ABOUTME: Picked up by Prometheus once kube-prometheus-stack syncs (wave 1).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-application-controller
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  # Chart 9.5.x: the application-controller's metrics Service is
  # "argocd-application-controller-metrics" but its label
  # app.kubernetes.io/name is "argocd-metrics" (NOT
  # "argocd-application-controller-metrics" like the other two).  This
  # is a quirk of the chart -- verified by `helm template`.
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-metrics
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics
