# ABOUTME: ServiceMonitor for the argocd-server component's metrics endpoint.
# ABOUTME: Picked up by Prometheus once kube-prometheus-stack syncs (wave 1).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  # The argo-cd chart 9.5.x creates a Service named "argocd-server-metrics"
  # with label app.kubernetes.io/name=argocd-server-metrics.  Selecting on
  # the main "argocd-server" Service would target ports that don't expose
  # metrics.
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server-metrics
  endpoints:
    - port: http-metrics    # Chart names the metrics port "http-metrics", not "metrics".
      interval: 30s
      path: /metrics
