# ABOUTME: Kyverno ClusterPolicy requiring CPU and memory limits on Pods in the apps namespace.
# ABOUTME: Demonstrates resource-governance admission control to keep workshop clusters healthy.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource limits
    policies.kyverno.io/category: Workshop / Best Practices
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps
      validate:
        message: "Pods in 'apps' must declare CPU and memory limits."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
